name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      # Trusted Publishing (OIDC) needs npm >= 11.5.1; Node 20's bundled npm predates that, and
      # npm >= 11.5.1 itself requires Node >= 22. Pin to an exact known-good version rather than
      # npm@latest so a compromised future npm release can't run in the publish job.
      - run: npm install -g npm@11.5.1
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
      # No NPM_TOKEN: npm CLI >= 11.5.1 detects the OIDC context from `id-token: write` above and
      # authenticates directly with the registry using a short-lived token tied to this exact
      # workflow -- provenance is generated automatically under trusted publishing, so
      # --provenance isn't needed either. Requires a trusted publisher configured for this package
      # on npmjs.com (org/repo/workflow filename must match exactly) -- see README.md.
      - run: npm publish --access public
